  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Mobile Device Testing Tips & Guides</title>
  <meta name="description" content="Read the latest posts about phone hardware testing, battery health, camera checks, sensors, and buying used phones.">
  <link rel="canonical" href="https://mobiledevice.github.io/blog">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230969DA%22/><text x=%2250%22 y=%2266%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22monospace%22>&lt;/&gt;</text></svg>">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    /* minimal blog-specific tweaks */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .blog-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
    }
    .blog-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: #C4CCD4;
    }
    .blog-card .tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--purple);
      background: var(--purple-dim);
      padding: 3px 10px;
      border-radius: 999px;
      align-self: flex-start;
      margin-bottom: 12px;
    }
    .blog-card h3 {
      font-size: 18px;
      margin: 0 0 8px;
      line-height: 1.3;
    }
    .blog-card h3 a {
      color: var(--ink);
      text-decoration: none;
    }
    .blog-card h3 a:hover {
      color: var(--blue);
    }
    .blog-card p {
      font-size: 14px;
      color: var(--muted);
      flex: 1;
      margin: 0 0 16px;
    }
    .blog-card .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border-soft);
      padding-top: 14px;
    }
    .blog-card .meta .date {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .blog-card .meta .read-more {
      font-weight: 600;
      color: var(--blue);
      text-decoration: none;
    }
    .blog-card .meta .read-more:hover {
      text-decoration: underline;
    }
    .section-head p {
      font-size: 17px;
    }
    @media (max-width: 980px) {
      .blog-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px) {
      .blog-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Header component mounts here (js/header.js) -->
  <header id="site-header"></header>

  <main>
    <section class="section" style="border-bottom: 1px dashed var(--border); padding-top: 64px;">
      <div class="container">
        <div class="section-head reveal is-visible">
          <span class="eyebrow">articles & guides</span>
          <h2>Mobile testing blog</h2>
          <p>Practical walkthroughs, checklists, and comparisons to help you understand your phone's hardware.</p>
        </div>

        <div class="blog-grid" id="blogGrid">
          <!-- cards will be rendered by JS -->
        </div>
      </div>
    </section>

    <!-- simple CTA back to tools -->
    <section class="section" style="border-bottom:none; padding-top: 40px;">
      <div class="container">
        <div class="cta-band" style="background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 32px; text-align: center; color: var(--ink); background-image: none;">
          <h2 style="color: var(--ink);">Ready to test your device?</h2>
          <p style="color: var(--ink-soft); max-width: 480px; margin: 0 auto 20px;">Run a free, browser-based hardware check in seconds.</p>
          <a href="/#tools" class="btn btn-primary">Go to testing tools</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer component mounts here (js/footer.js) -->
  <footer id="site-footer"></footer>

  <!-- scripts -->
  <script src="/js/header.js"></script>
  <script src="/js/footer.js"></script>
  <script>
    // Blog data – extended with 5 new posts (duplicate "Touchscreen Issues?" removed, only one kept)
    const posts = [
      {
        slug: "battery-health-check-phone-dying-fast",
        title: "Battery Health Check: Is Your Phone Battery Dying Faster Than Expected?",
        excerpt: "Learn how to diagnose a degrading battery using real-world discharge patterns and built-in diagnostics.",
        category: "Battery",
        date: "2026-07-11"
      },
      {
        slug: "check-phone-camera-working",
        title: "How to Check If Your Phone Camera Is Actually Working",
        excerpt: "A step-by-step guide to test both front and rear cameras, flash, autofocus, and image stabilization.",
        category: "Camera",
        date: "2026-07-10"
      },
      {
        slug: "hardware-tests-before-buying-used-phone",
        title: "10 Must-Do Hardware Tests Before Buying a Used Phone in 2026",
        excerpt: "Don't get stuck with a lemon. Run these ten checks before you hand over any money for a used device.",
        category: "Used Phone",
        date: "2026-07-10"
      },
      {
        slug: "hidden-phone-sensors-to-test",
        title: "Top 7 Hidden Phone Sensors You Should Test Right Now",
        excerpt: "From accelerometer to barometer — discover the sensors that affect everyday use and how to test them.",
        category: "Sensors",
        date: "2026-07-11"
      },
      {
        slug: "iphone-vs-android-hardware-tests",
        title: "iPhone vs Android: Which Hardware Tests Matter Most in 2026?",
        excerpt: "Compare the most important diagnostics for iOS and Android devices — from Face ID to fingerprint sensors.",
        category: "Comparison",
        date: "2026-07-11"
      },
      {
        slug: "test-microphone-before-selling-phone",
        title: "How to Test Microphone Quality Before Selling Your Old Phone",
        excerpt: "Ensure your mic is crisp and clear — test voice recording, noise cancellation, and call quality.",
        category: "Microphone",
        date: "2026-07-10"
      },
      // ----- 5 new posts added below (duplicate touchscreen removed) -----
      {
        slug: "browser-diagnostics-vs-repair-shops",
        title: "Why Browser-Based Phone Diagnostics Beat Repair Shops",
        excerpt: "Discover the speed, privacy, and accuracy of in-browser hardware tests compared to traditional repair shop diagnostics.",
        category: "Diagnostics",
        date: "2026-07-12"
      },
      {
        slug: "touchscreen-issues-browser-tests",
        title: "Touchscreen Issues? Run These Quick Browser Tests",
        excerpt: "Is your screen unresponsive or glitchy? Use these simple browser-based tests to pinpoint touchscreen problems in minutes.",
        category: "Touchscreen",
        date: "2026-07-12"
      },
      {
        slug: "phone-hardware-failures-after-drops",
        title: "Common Phone Hardware Failures After Drops",
        excerpt: "From cracked displays to loose charging ports — learn which components are most vulnerable and how to check for damage.",
        category: "Repair",
        date: "2026-07-11"
      },
      {
        slug: "refurbished-smartphone-checklist",
        title: "Ultimate Pre-Purchase Checklist for Refurbished Smartphones",
        excerpt: "A complete checklist covering battery, display, cameras, sensors, and more — so you can buy a refurbished phone with confidence.",
        category: "Used Phone",
        date: "2026-07-13"
      }
      // (Note: the duplicate "Touchscreen Issues?" was intentionally omitted)
    ];

    function renderBlog() {
      const grid = document.getElementById('blogGrid');
      if (!grid) return;
      grid.innerHTML = posts.map(post => `
        <div class="blog-card reveal is-visible">
          <span class="tag">${post.category}</span>
          <h3><a href="/${post.slug}">${post.title}</a></h3>
          <p>${post.excerpt}</p>
          <div class="meta">
            <span class="date">📅 ${post.date}</span>
            <a href="/${post.slug}" class="read-mono read-more">Read →</a>
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', renderBlog);
  </script>
</body>
</html>
