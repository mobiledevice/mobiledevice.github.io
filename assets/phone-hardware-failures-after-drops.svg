<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#E1E6EB"/>
    </pattern>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0969DA"/>
      <stop offset="55%" stop-color="#8250DF"/>
      <stop offset="100%" stop-color="#1A7F37"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#FAFBFC"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- accent blob -->
  <circle cx="1080" cy="80" r="260" fill="url(#grad)" opacity="0.10"/>
  <circle cx="1150" cy="560" r="180" fill="url(#grad)" opacity="0.08"/>

  <!-- top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#grad)"/>

  <!-- icon chip -->
  <rect x="80" y="90" width="92" height="92" rx="20" fill="#FFFFFF" stroke="#D7DCE1" stroke-width="1.5"/>
  <text x="126" y="152" font-size="46" text-anchor="middle" font-family="'Segoe UI Emoji','Apple Color Emoji',sans-serif">📉</text>

  <!-- category tag -->
  <rect x="80" y="210" width="175" height="34" rx="17" fill="#F1E9FE"/>
  <text x="167.5" y="232" font-size="14" font-family="'JetBrains Mono',monospace" font-weight="600" fill="#8250DF" text-anchor="middle">TROUBLESHOOTING</text>

  <!-- title -->
  <text font-size="48" font-family="'Space Grotesk','Segoe UI',sans-serif" font-weight="700" fill="#1B1F23"><tspan x="80" y="312.0">Common Phone Hardware</tspan><tspan x="80" y="368.0">Failures After Drops</tspan></text>

  <!-- brand -->
  <g transform="translate(80, 560)">
    <rect width="28" height="28" rx="7" fill="url(#grad)"/>
    <text x="14" y="19" font-size="13" font-family="'JetBrains Mono',monospace" font-weight="700" fill="#fff" text-anchor="middle">&lt;/&gt;</text>
    <text x="38" y="19" font-size="16" font-family="'Space Grotesk',sans-serif" font-weight="600" fill="#1B1F23">mobiledevice<tspan fill="#0969DA">.tools</tspan></text>
  </g>
</svg>